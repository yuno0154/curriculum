<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>성취기준 검색 대시보드</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@100..900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="container">
        <header>
            <h1 class="fade-in">성취기준 <span>검색</span></h1>
            <p class="subtitle fade-in">2022 개정 교육과정 성취기준 통합 검색 시스템</p>

            <div class="main-tabs slide-up">
                <button class="main-tab-btn active" data-tab="subject">과목별 탐색</button>
                <button class="main-tab-btn" data-tab="keyword">성취기준 검색</button>
            </div>
        </header>

        <main>
            <!-- ── 과목별 탐색 탭 ── -->
            <div id="tabSubject" class="tab-content">
                <div class="level-tabs">
                    <button class="level-btn active" data-level="middle">중학교</button>
                    <button class="level-btn" data-level="high">고등학교</button>
                </div>

                <!-- 중학교: 과목 칩 목록 -->
                <div id="middleSubjectList" class="subject-chip-list"></div>

                <!-- 고등학교: 교과 아코디언 -->
                <div id="highSubjectList" class="accordion-list" style="display:none"></div>

                <!-- 선택된 과목의 성취기준 결과 -->
                <div id="subjectResults" class="results-area"></div>
            </div>

            <!-- ── 성취기준 키워드 검색 탭 ── -->
            <div id="tabKeyword" class="tab-content" style="display:none">
                <div class="keyword-search-wrap">
                    <div class="keyword-search-box">
                        <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
                             fill="none" stroke="currentColor" stroke-width="2"
                             stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="11" cy="11" r="8"/>
                            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                        </svg>
                        <input type="text" id="keywordInput"
                               placeholder="성취기준 키워드를 입력하세요..." autocomplete="off">
                    </div>
                </div>
                <div id="keywordResults" class="results-area">
                    <div class="empty-state"><span>🔍</span><p>성취기준 키워드를 입력해 주세요.</p></div>
                </div>
            </div>
        </main>

        <footer>
            <p>&copy; 2026 사곡고등학교 성취기준 추출 시스템</p>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
